<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票題材儀表板</title>
<style>
  :root{
    --bg:#eef2f8; --bg2:#e6ecf5;
    --panel:#ffffff; --panel2:#f5f7fb; --row-alt:#fafbfe;
    --border:#e6eaf1; --border2:#dde3ec;
    --text:#2b3445; --text2:#3d4759; --muted:#8b94a7; --head:#f6f8fc;
    --up:#1c9c63; --up-soft:#e7f6ee; --down:#e0596b; --down-soft:#fdedef;
    --accent:#5a78f0; --accent-soft:#eef1fe; --chip:#eef1f7;
    --shadow:0 1px 2px rgba(28,40,77,.04), 0 4px 16px rgba(28,40,77,.06);
  }
  *{box-sizing:border-box;}
  body{margin:0;color:var(--text);
    background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
    background-attachment:fixed;min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",Roboto,Helvetica,Arial,sans-serif;
    font-size:14px;-webkit-font-smoothing:antialiased;}
  header.top{display:flex;align-items:center;gap:12px;flex-wrap:wrap;
    padding:14px 24px;background:rgba(255,255,255,.82);backdrop-filter:saturate(160%) blur(10px);
    border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;}
  header.top h1{font-size:18px;margin:0;font-weight:800;letter-spacing:.3px;color:var(--text);}
  header.top h1::before{content:"";display:inline-block;width:9px;height:18px;border-radius:3px;
    background:linear-gradient(180deg,var(--accent),#8aa0f6);margin-right:9px;vertical-align:-3px;}
  .spacer{flex:1;}
  .muted{color:var(--muted);}
  .btn{background:#fff;color:var(--text2);border:1px solid var(--border2);
    border-radius:9px;padding:7px 13px;cursor:pointer;font-size:13px;font-weight:500;transition:.15s;}
  .btn:hover{background:var(--panel2);border-color:#cdd5e1;box-shadow:var(--shadow);}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .btn.primary:hover{background:#4869ed;}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--muted);}
  .btn.ghost:hover{background:var(--panel2);box-shadow:none;}
  input,select{background:#fff;color:var(--text);border:1px solid var(--border2);
    border-radius:9px;padding:7px 11px;font-size:13px;outline:none;transition:.15s;}
  input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  label.inline{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;cursor:pointer;}
  main{padding:22px 24px 64px;max-width:1500px;margin:0 auto;}
  .theme{margin-bottom:22px;border:1px solid var(--border);border-radius:16px;overflow:hidden;
    background:var(--panel);box-shadow:var(--shadow);}
  .theme-head{display:flex;align-items:center;gap:12px;padding:14px 18px;
    background:var(--panel2);border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .theme-head .tname{font-size:15.5px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--text);}
  .theme-head .count{color:var(--muted);font-size:12px;font-weight:500;background:var(--chip);padding:2px 9px;border-radius:20px;}
  .caret{transition:.2s;display:inline-block;color:var(--muted);font-size:12px;}
  .theme.collapsed .caret{transform:rotate(-90deg);}
  .theme.collapsed .tscroll, .theme.collapsed .add-row{display:none;}
  .tscroll{overflow-x:auto;}
  table{min-width:760px;}
  .add-row{display:flex;gap:8px;align-items:center;padding:12px 18px;border-top:1px solid var(--border);flex-wrap:wrap;background:var(--row-alt);}
  table{width:100%;border-collapse:collapse;}
  thead th{background:var(--head);color:var(--muted);font-weight:600;text-align:right;
    padding:11px 16px;font-size:12px;letter-spacing:.2px;border-bottom:1px solid var(--border);
    cursor:pointer;white-space:nowrap;user-select:none;transition:.12s;}
  thead th.left{text-align:left;}
  thead th:hover{color:var(--accent);background:var(--accent-soft);}
  thead th .arrow{font-size:9px;margin-left:3px;color:var(--accent);}
  tbody td{padding:11px 16px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;color:var(--text2);}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:nth-child(even){background:var(--row-alt);}
  tbody tr:hover{background:var(--accent-soft);}
  td.name{text-align:left;}
  a.sym{font-weight:700;color:var(--text);text-decoration:none;border-bottom:1px dashed transparent;transition:.12s;}
  a.sym:hover{color:var(--accent);border-bottom-color:var(--accent);}
  a.sym::after{content:"↗";font-size:9px;color:var(--muted);margin-left:3px;vertical-align:1px;opacity:0;transition:.12s;}
  a.sym:hover::after{opacity:1;color:var(--accent);}
  .cname{color:var(--muted);font-size:12px;}
  .up{color:var(--up);font-weight:600;} .down{color:var(--down);font-weight:600;}
  .last{font-variant-numeric:tabular-nums;font-weight:700;color:var(--text);}
  td{font-variant-numeric:tabular-nums;}
  .del{color:var(--muted);cursor:pointer;visibility:hidden;padding:0 5px;font-size:12px;}
  tbody tr:hover .del{visibility:visible;}
  .del:hover{color:var(--down);}
  .badge{display:inline-block;width:32px;height:32px;border-radius:9px;
    background:linear-gradient(135deg,var(--accent-soft),#e3e9ff);
    text-align:center;line-height:32px;font-size:11px;font-weight:700;color:var(--accent);margin-right:8px;}
  .empty{padding:26px 16px;color:var(--muted);text-align:center;}
  .loading{color:var(--muted);font-style:italic;}
  .status{font-size:12px;}
  .err{color:var(--down);font-size:12px;}
  .help{font-size:12.5px;color:var(--muted);max-width:820px;line-height:1.7;margin:4px 0 22px;}
  .help code{background:var(--chip);padding:1px 6px;border-radius:5px;color:var(--text2);font-size:12px;}
  /* 唯讀模式：隱藏所有編輯控制 */
  body.readonly #addThemeBtn,
  body.readonly .add-row,
  body.readonly .theme-head [data-act],
  body.readonly .del{ display:none !important; }
  dialog{background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:16px;padding:0;width:min(420px,92vw);box-shadow:0 20px 60px rgba(28,40,77,.25);}
  dialog::backdrop{background:rgba(40,52,77,.32);backdrop-filter:blur(2px);}
  .dlg-body{padding:22px;}
  .dlg-body h3{margin:0 0 14px;color:var(--text);}
  .dlg-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}
</style>
</head>
<body>
<header class="top">
  <h1>股票題材儀表板</h1>
  <span class="status muted" id="status">準備中…</span>
  <div class="spacer"></div>
  <label class="inline"><input type="checkbox" id="autoChk"> 自動更新</label>
  <select id="intervalSel" title="自動更新間隔">
    <option value="30">30 秒</option>
    <option value="60" selected>1 分鐘</option>
    <option value="180">3 分鐘</option>
    <option value="300">5 分鐘</option>
  </select>
  <button class="btn" id="refreshBtn">↻ 重新整理</button>
  <button class="btn primary" id="addThemeBtn">＋ 新增題材</button>
  <span id="authInfo" class="status muted"></span>
  <button class="btn" id="setupRulesBtn" style="display:none" title="複製鎖定規則並顯示你的 UID">🔑 取得我的規則/UID</button>
  <button class="btn" id="loginBtn" style="display:none">登入</button>
  <button class="btn ghost" id="logoutBtn" style="display:none">登出</button>
</header>

<main>
  <div class="help">
    每個題材是一張即時報價表。在題材下方輸入框打入股票代號就能加入，例如：美股 <code>NVDA</code>、日股 <code>6146.T</code>、台股 <code>2330.TW</code>（上市）或 <code>3455.TWO</code>（上櫃）。
    資料來自 Yahoo Finance，盤中約有 15 分鐘延遲。所有題材與股票會自動存在這台瀏覽器，下次打開仍在。
  </div>
  <div id="themes"></div>
</main>

<dialog id="themeDialog">
  <div class="dlg-body">
    <h3>新增題材</h3>
    <input id="themeNameInput" placeholder="題材名稱，例如：AI 伺服器" style="width:100%;">
    <div class="dlg-actions">
      <button class="btn ghost" id="themeCancel">取消</button>
      <button class="btn primary" id="themeOk">建立</button>
    </div>
  </div>
</dialog>

<!-- Firebase（雲端同步題材設定，可跨裝置；未填 config 則自動停用，只用本機 localStorage） -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
/* ============================== 設定 ============================== */
const LS_THEMES = "stk_themes_v1";
const LS_NAMES  = "stk_names_v1";
const LS_PREF   = "stk_pref_v1";

/* ===== Firebase 設定：建立專案後，把下面整個物件換成你的 firebaseConfig ===== */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCwf3ys8CFegSKqoElMPNi0ZJ51KANZYAE",
  authDomain: "stock-dashboard-c595d.firebaseapp.com",
  projectId: "stock-dashboard-c595d",
  storageBucket: "stock-dashboard-c595d.firebasestorage.app",
  messagingSenderId: "759320799290",
  appId: "1:759320799290:web:e15000031890438f3aad03"
};
const CLOUD_DOC = "dashboards/main";   // 題材設定存放的 Firestore 文件路徑
// 可編輯者名單（Google 登入 UID）。要新增編輯者就把對方 UID 加進這個陣列，並同步更新 Firestore 規則。
const OWNER_UIDS = [
  "JN5nkZ6t8TcEc6AJNvnISvdWKDt1",   // 本人
  "arxW8uOFEQTwBb8o3XKkOnsGu5H3",   // 朋友
];

// 預設題材（附圖那組：半導體設備 / 檢測）
const DEFAULT_THEMES = {
  "半導體設備 / 檢測測試": [
    "6146.T","6920.T","6857.T","ONTO","FORM","AEHR","CAMT","TER",
    "KLAC","3455.TWO","3563.TW","KEYS","6856.T","6951.T","KLIC"
  ],
  "AI 半導體 / 晶片": ["NVDA","AMD","AVGO","TSM","2330.TW","ASML"],
};

// 透過公開 CORS proxy 連 Yahoo（依序嘗試，前一個失敗換下一個）
const PROXIES = [
  u => "https://corsproxy.io/?url=" + encodeURIComponent(u),
  u => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u),
  u => "https://thingproxy.freeboard.io/fetch/" + u,
];

/* ============================== 狀態 ============================== */
let themes = loadJSON(LS_THEMES) || structuredClone(DEFAULT_THEMES);
let names  = loadJSON(LS_NAMES)  || {};   // symbol -> {name, currency}
let pref   = loadJSON(LS_PREF)   || {auto:false, interval:60, sort:{}, collapsed:{}};
let dataMap = {};                          // symbol -> quote data
let autoTimer = null;

/* ============================== 工具 ============================== */
function loadJSON(k){ try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;} }
function saveAll(){
  localStorage.setItem(LS_THEMES, JSON.stringify(themes));
  localStorage.setItem(LS_NAMES, JSON.stringify(names));
  localStorage.setItem(LS_PREF, JSON.stringify(pref));
  saveCloud();
}
function $(id){return document.getElementById(id);}

/* ============================== Firebase 雲端同步 + 權限 ============================== */
let db=null, auth=null, currentUser=null, cloudReady=false, suppressCloud=false, cloudTimer=null;

// 是否可編輯：名單為空 → 任何人可編輯；已設名單 → 只有名單內的登入者
function canEdit(){ return OWNER_UIDS.length===0 || (currentUser && OWNER_UIDS.includes(currentUser.uid)); }
function applyMode(){ document.body.classList.toggle("readonly", !canEdit()); }

function updateAuthUI(){
  const inb=$("loginBtn"), outb=$("logoutBtn"), info=$("authInfo"), rb=$("setupRulesBtn");
  if(!cloudReady){ inb.style.display=outb.style.display=rb.style.display="none"; return; }
  if(currentUser){
    inb.style.display="none"; outb.style.display="";
    info.textContent = (currentUser.displayName||currentUser.email||"已登入") + (canEdit()?"（可編輯）":"（唯讀）");
    rb.style.display = "";   // 任何登入者都能查看自己的 UID（方便加入編輯名單）
  }else{
    inb.style.display=""; outb.style.display="none"; rb.style.display="none";
    info.textContent = OWNER_UIDS.length ? "唯讀模式 · 登入以編輯" : "";
  }
}

function initFirebase(){
  if(!FIREBASE_CONFIG.apiKey || typeof firebase==="undefined") return; // 未設定 → 只用本機
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    auth = firebase.auth();
    cloudReady = true;
    auth.onAuthStateChanged(u=>{ currentUser=u; updateAuthUI(); applyMode(); render(); });
    $("status").innerHTML = "已連線雲端，載入設定中…";
    db.doc(CLOUD_DOC).onSnapshot(snap=>{
      if(!snap.exists){ saveCloud(); return; }     // 首次：把目前設定寫上雲端
      const data = snap.data() || {};
      suppressCloud = true;                          // 避免回寫造成迴圈
      if(data.themes) themes = data.themes;
      if(data.names)  names  = data.names;
      localStorage.setItem(LS_THEMES, JSON.stringify(themes));
      localStorage.setItem(LS_NAMES, JSON.stringify(names));
      suppressCloud = false;
      const syms = [...new Set(Object.values(themes).flat())];
      render();
      if(syms.some(s=>!dataMap[s] || dataMap[s].last==null)) refresh();  // 有新股票才重抓
    }, err=>console.warn("Firestore 監聽失敗：", err.message));
  }catch(e){ console.warn("Firebase 初始化失敗：", e.message); }
}
function saveCloud(){
  if(!cloudReady || suppressCloud || !canEdit()) return;
  clearTimeout(cloudTimer);
  cloudTimer = setTimeout(()=>{
    db.doc(CLOUD_DOC).set({themes, names, updated:Date.now()}, {merge:true})
      .catch(e=>console.warn("雲端儲存失敗：", e.message));
  }, 600);
}

// 只有在本機（localhost，由 server.py 提供）才走本機代理；線上（GitHub Pages）走公開 proxy
const IS_LOCAL = ["localhost","127.0.0.1"].includes(location.hostname);
const LOCAL = IS_LOCAL ? (location.origin + "/yf?url=") : null;

async function fetchJSON(url){
  // 本機模式只走本機代理（最快、最準）；單獨開檔才回退公開 proxy
  const attempts = LOCAL ? [LOCAL + encodeURIComponent(url)]
                         : [...PROXIES.map(p=>p(url)), url];
  for(const a of attempts){
    try{
      const ctrl = new AbortController();
      const timer = setTimeout(()=>ctrl.abort(), 9000);
      const r = await fetch(a, {cache:"no-store", signal:ctrl.signal});
      clearTimeout(timer);
      if(!r.ok) continue;
      const t = await r.text();
      return JSON.parse(t);
    }catch(e){ /* 換下一個 */ }
  }
  throw new Error("fetch failed");
}

/* ----- 數字格式 ----- */
function fmtPrice(v){
  if(v==null||isNaN(v)) return "—";
  return v.toLocaleString("en-US",{maximumFractionDigits:2});
}
function fmtPct(v){
  if(v==null||isNaN(v)) return "—";
  return (v*100).toFixed(2)+"%";
}
function fmtVol(v){
  if(v==null||isNaN(v)) return "—";
  if(v>=1e6) return (v/1e6).toFixed(2)+" M";
  return Math.round(v).toLocaleString("en-US");
}
function fmtCap(v,cur){
  if(v==null||isNaN(v)) return "—";
  let s;
  if(v>=1e12) s=(v/1e12).toFixed(2)+" T";
  else if(v>=1e9) s=(v/1e9).toFixed(2)+" B";
  else if(v>=1e6) s=(v/1e6).toFixed(2)+" M";
  else s=Math.round(v).toLocaleString("en-US");
  return s + (cur?(" "+cur):"");
}
function cls(v){ return v>0?"up":(v<0?"down":""); }

/* ============================== 抓資料 ============================== */
// 每檔只打一支 chart：行情、量、漲跌幅、名稱都在裡面（不需 crumb，最穩）
async function fetchChart(sym){
  const out = {symbol:sym, error:false};
  try{
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?range=1y&interval=1d`;
    const j = await fetchJSON(url);
    const res = j.chart.result[0];
    const m = res.meta;
    const ts = res.timestamp || [];
    const closes = (res.indicators && res.indicators.quote && res.indicators.quote[0].close) || [];
    const last = m.regularMarketPrice;
    const prev = m.chartPreviousClose ?? m.previousClose;
    const nowSec = m.regularMarketTime || Math.floor(Date.now()/1000);
    const firstClose = closes.find(c=>c!=null);
    const ref = (daysAgo)=>{
      const target = nowSec - daysAgo*86400;
      let best=null;
      for(let i=0;i<ts.length;i++){
        if(closes[i]==null) continue;
        if(ts[i]<=target) best=closes[i]; else break;
      }
      return best ?? firstClose;
    };
    out.last = last;
    out.currency = m.currency;
    out.volume = m.regularMarketVolume;
    if(m.longName||m.shortName){ names[sym] = {name:m.longName||m.shortName, currency:m.currency}; }
    out.day  = prev?(last-prev)/prev:null;
    out.week = ref(7)?(last-ref(7))/ref(7):null;
    out.month= ref(30)?(last-ref(30))/ref(30):null;
    out.year = firstClose?(last-firstClose)/firstClose:null;
  }catch(e){ out.error = true; }
  out.name = (names[sym] && names[sym].name) || sym;
  return out;
}

// 一次抓「所有股票」的 P/E 與市值（單一批次請求，大幅減少呼叫）
async function fetchFundamentals(symbols){
  const res = {};
  if(!symbols.length) return res;
  try{
    const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${encodeURIComponent(symbols.join(","))}`;
    const j = await fetchJSON(url);
    for(const q of (j.quoteResponse && j.quoteResponse.result || [])){
      res[q.symbol] = {pe:q.trailingPE ?? null, cap:q.marketCap ?? null,
        name:q.longName||q.shortName, currency:q.currency};
    }
  }catch(e){ /* 取不到就留空，行情照常 */ }
  return res;
}

async function refresh(){
  const all = [...new Set(Object.values(themes).flat())];
  if(all.length===0){ $("status").textContent="尚無股票"; render(); return; }
  $("status").innerHTML = `<span class="loading">更新中… 0/${all.length}</span>`;
  let done=0;
  // 同時送出：批次抓本益比/市值（一支搞定全部）
  const fundP = fetchFundamentals(all);
  // 各股 chart（提高併發）
  const queue=[...all]; const CONC=6;
  async function worker(){
    while(queue.length){
      const sym=queue.shift();
      dataMap[sym] = await fetchChart(sym);
      done++;
      $("status").innerHTML = `<span class="loading">更新中… ${done}/${all.length}</span>`;
      render();
    }
  }
  await Promise.all(Array.from({length:CONC},worker));
  // 合併基本面
  const fund = await fundP;
  for(const sym of all){
    const f = fund[sym]; if(!f) continue;
    const d = dataMap[sym] || (dataMap[sym]={symbol:sym});
    d.pe = f.pe; d.cap = f.cap;
    if(f.currency && !d.currency) d.currency = f.currency;
    if((!names[sym] || !names[sym].name) && f.name){ names[sym] = {name:f.name, currency:f.currency}; }
    if(!d.name || d.name===sym) d.name = (names[sym] && names[sym].name) || sym;
  }
  saveAll(); render();
  const t = new Date().toLocaleTimeString("zh-Hant");
  $("status").innerHTML = `更新時間 ${t}`;
}

/* ============================== 渲染 ============================== */
const COLS = [
  {key:"name",  label:"Name",        left:true},
  {key:"last",  label:"Last"},
  {key:"volume",label:"Day Volume"},
  {key:"day",   label:"Day Change"},
  {key:"week",  label:"Week Change"},
  {key:"month", label:"Month Change"},
  {key:"year",  label:"Year Change"},
  {key:"pe",    label:"P/E Ratio"},
  {key:"cap",   label:"Market Cap"},
];

function render(){
  applyMode();   // 依登入狀態套用唯讀／可編輯
  const root = $("themes");
  root.innerHTML = "";
  const tnames = Object.keys(themes);
  if(tnames.length===0){
    root.innerHTML = `<div class="empty">還沒有題材，點右上角「＋ 新增題材」開始。</div>`;
    return;
  }
  for(const tname of tnames){
    root.appendChild(renderTheme(tname));
  }
}

function renderTheme(tname){
  const wrap = document.createElement("div");
  wrap.className = "theme" + (pref.collapsed[tname]?" collapsed":"");
  const syms = themes[tname];

  // head
  const head = document.createElement("div");
  head.className = "theme-head";
  head.innerHTML = `
    <div class="tname"><span class="caret">▾</span>${escapeHtml(tname)}
      <span class="count">${syms.length} 檔</span></div>
    <div class="spacer" style="flex:1"></div>
    <button class="btn ghost" data-act="rename">✎ 改名</button>
    <button class="btn ghost" data-act="delTheme">🗑 刪除題材</button>`;
  head.querySelector(".tname").onclick = ()=>{
    pref.collapsed[tname] = !pref.collapsed[tname]; saveAll(); render();
  };
  head.querySelector('[data-act="rename"]').onclick = ()=>renameTheme(tname);
  head.querySelector('[data-act="delTheme"]').onclick = ()=>{
    if(confirm(`確定刪除題材「${tname}」？`)){ delete themes[tname]; delete pref.collapsed[tname]; saveAll(); render(); }
  };
  wrap.appendChild(head);

  // table
  const sort = pref.sort[tname] || {key:"day", dir:-1};
  const table = document.createElement("table");
  const thead = document.createElement("thead");
  const trh = document.createElement("tr");
  for(const c of COLS){
    const th = document.createElement("th");
    th.className = c.left?"left":"";
    th.innerHTML = c.label + (sort.key===c.key?`<span class="arrow">${sort.dir<0?"▼":"▲"}</span>`:"");
    th.onclick = ()=>{
      const dir = (sort.key===c.key)? -sort.dir : (c.key==="name"?1:-1);
      pref.sort[tname] = {key:c.key, dir}; saveAll(); render();
    };
    trh.appendChild(th);
  }
  thead.appendChild(trh); table.appendChild(thead);

  const tbody = document.createElement("tbody");
  let rows = syms.map(s=>({sym:s, d:dataMap[s]||{symbol:s}}));
  rows.sort((a,b)=>{
    let va,vb;
    if(sort.key==="name"){ va=(a.d.name||a.sym).toLowerCase(); vb=(b.d.name||b.sym).toLowerCase();
      return va<vb?-1*sort.dir:(va>vb?1*sort.dir:0); }
    va = a.d[sort.key]; vb = b.d[sort.key];
    if(va==null) return 1; if(vb==null) return -1;
    return (va-vb)*sort.dir;
  });

  if(rows.length===0){
    const tr=document.createElement("tr");
    tr.innerHTML=`<td colspan="${COLS.length}" class="empty">尚無股票，於下方輸入代號加入</td>`;
    tbody.appendChild(tr);
  }
  for(const {sym,d} of rows){
    const tr = document.createElement("tr");
    const cur = (names[sym]&&names[sym].currency) || d.currency;
    if(d.error && d.last==null){
      tr.innerHTML = `<td class="name"><span class="del" title="移除">✕</span>
        <span class="badge">${sym.slice(0,2)}</span>
        <a class="sym" href="${tvUrl(sym)}" target="_blank" rel="noopener" title="在 TradingView 開啟">${escapeHtml(sym)}</a> <span class="err">讀取失敗</span></td>
        <td colspan="${COLS.length-1}"></td>`;
    }else{
      tr.innerHTML = `
        <td class="name"><span class="del" title="移除">✕</span>
          <span class="badge">${escapeHtml(sym.replace(/\..*/,'').slice(0,4))}</span>
          <a class="sym" href="${tvUrl(sym)}" target="_blank" rel="noopener" title="在 TradingView 開啟">${escapeHtml(sym)}</a><br>
          <span class="cname">${escapeHtml(d.name||"")}</span></td>
        <td class="last">${fmtPrice(d.last)}</td>
        <td>${fmtVol(d.volume)}</td>
        <td class="${cls(d.day)}">${fmtPct(d.day)}</td>
        <td class="${cls(d.week)}">${fmtPct(d.week)}</td>
        <td class="${cls(d.month)}">${fmtPct(d.month)}</td>
        <td class="${cls(d.year)}">${fmtPct(d.year)}</td>
        <td>${d.pe!=null?d.pe.toFixed(2):"—"}</td>
        <td>${fmtCap(d.cap,cur)}</td>`;
    }
    tr.querySelector(".del").onclick = ()=>{
      themes[tname] = themes[tname].filter(x=>x!==sym); saveAll(); render();
    };
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  const tscroll = document.createElement("div");
  tscroll.className = "tscroll";
  tscroll.appendChild(table);
  wrap.appendChild(tscroll);

  // add row
  const add = document.createElement("div");
  add.className="add-row";
  add.innerHTML = `<input placeholder="輸入股票代號，例如 NVDA、6146.T、2330.TW" style="flex:1;min-width:220px;">
    <button class="btn primary">＋ 加入</button>`;
  const inp = add.querySelector("input"), btn = add.querySelector("button");
  const doAdd = async ()=>{
    let s = inp.value.trim().toUpperCase();
    if(!s) return;
    if(themes[tname].includes(s)){ inp.value=""; return; }
    themes[tname].push(s); inp.value=""; saveAll(); render();
    dataMap[s] = await fetchChart(s);
    const f = (await fetchFundamentals([s]))[s];
    if(f){ dataMap[s].pe=f.pe; dataMap[s].cap=f.cap;
      if(f.currency && !dataMap[s].currency) dataMap[s].currency=f.currency;
      if((!names[s]||!names[s].name) && f.name) names[s]={name:f.name,currency:f.currency};
      if(!dataMap[s].name||dataMap[s].name===s) dataMap[s].name=(names[s]&&names[s].name)||s; }
    saveAll(); render();
  };
  btn.onclick = doAdd;
  inp.onkeydown = e=>{ if(e.key==="Enter") doAdd(); };
  wrap.appendChild(add);

  return wrap;
}

function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

// 股票代號 → TradingView 對應股票頁面網址
function tvUrl(sym){
  const base = sym.replace(/\..*/,"");
  let path;
  if(sym.endsWith(".TWO"))      path = "TPEX-" + base;   // 台股上櫃
  else if(sym.endsWith(".TW"))  path = "TWSE-" + base;   // 台股上市
  else if(sym.endsWith(".T"))   path = "TSE-"  + base;   // 日股 東京
  else                          path = base;             // 美股（TradingView 自動辨識交易所）
  return "https://www.tradingview.com/symbols/" + encodeURIComponent(path) + "/";
}

/* ============================== 題材增改 ============================== */
function renameTheme(old){
  const nn = prompt("新的題材名稱：", old);
  if(!nn || nn===old) return;
  if(themes[nn]){ alert("已有同名題材"); return; }
  const obj={};
  for(const k of Object.keys(themes)) obj[k===old?nn:k]=themes[k];
  themes = obj;
  if(pref.collapsed[old]){ pref.collapsed[nn]=true; delete pref.collapsed[old]; }
  if(pref.sort[old]){ pref.sort[nn]=pref.sort[old]; delete pref.sort[old]; }
  saveAll(); render();
}

/* ============================== 事件綁定 ============================== */
$("refreshBtn").onclick = refresh;
$("addThemeBtn").onclick = ()=>{ $("themeNameInput").value=""; $("themeDialog").showModal(); $("themeNameInput").focus(); };
$("themeCancel").onclick = ()=>$("themeDialog").close();
$("themeOk").onclick = ()=>{
  const n = $("themeNameInput").value.trim();
  if(!n) return;
  if(themes[n]){ alert("已有同名題材"); return; }
  themes[n]=[]; saveAll(); $("themeDialog").close(); render();
};
$("themeNameInput").onkeydown = e=>{ if(e.key==="Enter") $("themeOk").click(); };

/* ----- 登入 / 登出 / 取得規則 ----- */
$("loginBtn").onclick = ()=>{
  if(!auth) return;
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
    .catch(e=>alert("登入失敗：" + e.message));
};
$("logoutBtn").onclick = ()=>{ if(auth) auth.signOut(); };
$("setupRulesBtn").onclick = ()=>{
  if(!currentUser) return;
  const list = [...new Set([...OWNER_UIDS, currentUser.uid])];
  const arr = list.map(u=>`"${u}"`).join(", ");
  const rules =
`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /dashboards/{doc} {
      allow read: if true;
      allow write: if request.auth.uid in [${arr}];
    }
  }
}`;
  navigator.clipboard.writeText(rules).catch(()=>{});
  prompt("這是你的 UID（要成為編輯者，把它貼給擁有者加入名單）。\n（已複製含此 UID 的 Firestore 規則到剪貼簿）", currentUser.uid);
};

function setupAuto(){
  if(autoTimer){ clearInterval(autoTimer); autoTimer=null; }
  if(pref.auto){ autoTimer = setInterval(refresh, pref.interval*1000); }
}
$("autoChk").checked = pref.auto;
$("intervalSel").value = String(pref.interval);
$("autoChk").onchange = e=>{ pref.auto=e.target.checked; saveAll(); setupAuto(); };
$("intervalSel").onchange = e=>{ pref.interval=+e.target.value; saveAll(); setupAuto(); };

/* ============================== 啟動 ============================== */
render();
refresh();
setupAuto();
initFirebase();   // 若已填 FIREBASE_CONFIG 則啟用雲端同步
</script>
</body>
</html>
